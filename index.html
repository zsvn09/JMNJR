<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dear D - NFC 一碰开歌</title>
  
  <script>
    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: "Dear D " ,
        artist: "顶睿锅 / Yr.",
        album: "靖茹专属",
        artwork: [
          { src: "https://i.postimg.cc/DfYqH0sM/IMG-5849.webp", sizes: "512x512", type: "image/webp" },
          { src: "https://i.postimg.cc/DfYqH0sM/IMG-5849.webp", sizes: "192x192", type: "image/webp" },
          { src: "https://i.postimg.cc/DfYqH0sM/IMG-5849.webp", sizes: "96x96", type: "image/webp" }
        ]
      });
    }
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #1a0d2e 0%, #3a1e4a 50%, #5c2e6a 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: system-ui, -apple-system, sans-serif;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      margin: 0;
      padding: 0;
    }
    
    .player {
      max-width: 380px;
      width: 92%;
      padding: 32px 24px;
      background: rgba(30,20,50,0.85);
      border-radius: 28px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .cover {
      width: 240px;
      height: 240px;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 20px 45px rgba(0,0,0,0.6);
      margin-bottom: 28px;
    }
    
    h1 {
      font-size: 2.4rem;
      margin: 12px 0 8px;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(255,100,200,0.3);
    }
    
    p {
      font-size: 1.3rem;
      opacity: 0.85;
      margin: 0 0 28px;
      font-weight: 500;
    }
    
    audio {
      width: 100%;
      margin-top: 20px;
      outline: none;
    }
    
    audio::-webkit-media-controls-panel {
      background: rgba(40,30,60,0.9);
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <div class="player">
    <img class="cover" src="https://i.postimg.cc/DfYqH0sM/IMG-5849.webp" alt="Dear D 封面">
    <h1>Dear D</h1>
    <p>JR专属</p>
    <audio controls autoplay id="audioPlayer">
      <source src="https://files.catbox.moe/a2m9ox.mp3" type="audio/mpeg">
      浏览器不支持音频播放。
    </audio>
  </div>
  <script>
    const audio = document.getElementById('audioPlayer');
    audio.addEventListener('loadedmetadata', () => {
      audio.currentTime = 142;
    });
  </script>
</body>
</html>
