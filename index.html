<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Dear D - NFC 一碰开歌</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script>
    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: "Dear D ",
        artist: "顶睿锅 / Yr.",
        album: "靖茹专属",
        artwork: [{ src: "https://i.postimg.cc/DfYqH0sM/IMG-5849.webp", sizes: "512x512", type: "image/webp" }]
      });
    }
  </script>

  <style>
    /* 核心 1：锁定根层背景，绝不露白 */
    html {
      background: #1a0d2e; /* 顶部深紫兜底 */
      height: 100%;
      overflow: hidden;
      /* 禁用 Safari 弹性回弹，防止扯出白边 */
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100dvh; /* 动态视口高度，适配有无地址栏的情况 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      color: #fff;
      /* 这里的渐变颜色特意加深，确保和 iPhone 的黑色边框完美融合 */
      background: linear-gradient(180deg, #1a0d2e 0%, #2e1a3d 40%, #1a0d2e 100%);
      background-attachment: fixed;
      
      /* 核心 2：安全区避让，把卡片顶到黄金视觉位 */
      box-sizing: border-box;
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      /* 重点：底部预留足够空间，防止进度条被地址栏或 Home Bar 挡住 */
      padding-bottom: max(100px, env(safe-area-inset-bottom));
      
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* 播放器卡片样式优化 */
    .player {
      width: 85%;
      max-width: 340px;
      padding: 35px 25px;
      /* 毛玻璃效果加深 */
      background: rgba(255, 255, 255, 0.05);
      border-radius: 35px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
      
      /* 卡片轻微入场动画 */
      animation: playerSlideUp 1s ease-out;
    }

    @keyframes playerSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      max-width: 250px;
      border-radius: 22px;
      object-fit: cover;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
      margin-bottom: 30px;
    }

    h1 {
      font-size: 1.8rem;
      margin: 10px 0 5px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.5;
      margin: 0 0 30px;
    }

    /* 播放器控制栏优化 */
    audio {
      width: 100%;
      height: 40px;
      /* 反相色处理，配合深色背景 */
      filter: invert(100%) hue-rotate(180deg) brightness(1.4) contrast(0.9);
      opacity: 0.9;
    }

    /* 兼容性处理：防止网页在移动端被长按出现菜单 */
    * { -webkit-touch-callout: none; -webkit-user-select: none; }
    audio { -webkit-touch-callout: default; } /* 播放器除外 */

  </style>
</head>
<body>

  <div class="player">
    <img class="cover" src="https://i.postimg.cc/DfYqH0sM/IMG-5849.webp" alt="Dear D 封面">
    <h1>Dear D</h1>
    <p>JR专属</p>
    <audio controls autoplay id="audioPlayer">
      <source src="https://files.catbox.moe/a2m9ox.mp3" type="audio/mpeg">
      浏览器不支持播放
    </audio>
  </div>

  <script>
    const audio = document.getElementById('audioPlayer');
    
    // 设置初始播放位置 (2:22)
    audio.addEventListener('loadedmetadata', () => {
      audio.currentTime = 142;
    });

    // 针对移动端静音策略的强制激活
    const forcePlay = () => {
      if (audio.paused) {
        audio.play().catch(e => console.log("等待交互播放"));
      }
    };

    // 只要点击屏幕任何位置，就尝试播放
    document.addEventListener('touchstart', forcePlay, { once: true });
    document.addEventListener('click', forcePlay, { once: true });
  </script>
</body>
</html>
